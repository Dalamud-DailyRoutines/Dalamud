name: Upload to R2
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag (leave empty to auto-detect latest)'
        type: string
        required: false

jobs:
  upload:
    name: Upload to R2
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName')
          fi
          echo "TAG 定为: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo ${{ github.repository }} \
            --pattern 'hashes.json' \
            --pattern 'latest.7z' \
            --dir ./assets
          ls -la ./assets/

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # RELEASE — 纯文本，存放最新 release 的 tag 名
          echo -n "${{ steps.tag.outputs.tag }}" > RELEASE
          npx wrangler r2 object put dalamud-distribute/RELEASE \
            --remote \
            --file RELEASE \
            --cache-control 'public, max-age=300'

          # hashes.json — 收进 tag 文件夹
          npx wrangler r2 object put "dalamud-distribute/${{ steps.tag.outputs.tag }}/hashes.json" \
            --remote \
            --file ./assets/hashes.json \
            --cache-control 'public, max-age=300'

          # latest.7z — 1 年 immutable
          npx wrangler r2 object put "dalamud-distribute/${{ steps.tag.outputs.tag }}/latest.7z" \
            --remote \
            --file ./assets/latest.7z \
            --cache-control 'public, max-age=31536000, immutable'

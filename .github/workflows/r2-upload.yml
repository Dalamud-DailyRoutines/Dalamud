name: Upload to R2
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag (leave empty to auto-detect latest)'
        type: string
        required: false

jobs:
  upload:
    name: Upload to R2
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName')
          fi
          echo "TAG 定为: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo ${{ github.repository }} \
            --pattern 'hashes.json' \
            --pattern 'latest.7z' \
            --dir ./assets
          ls -la ./assets/

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          retry() { local n=0; until "$@"; do n=$((n+1)); [ $n -ge 3 ] && return 1; echo "Retry $n/3..."; sleep 3; done; }

          # RELEASE
          echo -n "${{ steps.tag.outputs.tag }}" > RELEASE
          retry npx wrangler r2 object put dalamud-distribute/RELEASE \
            --remote --file RELEASE --cache-control 'public, max-age=300'

          # hashes.json
          retry npx wrangler r2 object put "dalamud-distribute/${{ steps.tag.outputs.tag }}/hashes.json" \
            --remote --file ./assets/hashes.json --cache-control 'public, max-age=300'

          # latest.7z
          retry npx wrangler r2 object put "dalamud-distribute/${{ steps.tag.outputs.tag }}/latest.7z" \
            --remote --file ./assets/latest.7z --cache-control 'public, max-age=31536000, immutable'

      - name: Cleanup old versions (keep latest 5)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          KEYS=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/r2/buckets/dalamud-distribute/objects?limit=1000" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | jq -r '.result.objects[].key')

          TAGS=$(echo "$KEYS" | grep -oE '^[0-9]{2}-[0-9]{2}-[0-9]{2}-[0-9]{2}/' | sed 's|/||' | sort -u)
          KEEP=$(echo "$TAGS" | tail -5)

          for tag in $TAGS; do
            if ! echo "$KEEP" | grep -qx "$tag"; then
              echo "Deleting old version: $tag"
              echo "$KEYS" | grep "^$tag/" | while IFS= read -r key; do
                retry npx wrangler r2 object delete "dalamud-distribute/$key" --remote
              done
            fi
          done
          echo "Cleanup done, kept versions:"; echo "$KEEP"
